name: Daily Momentum Dashboard

on:
  schedule:
    - cron: "0 5 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: global_asset_dash
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run dashboard
        working-directory: global_asset_dash
        run: python dashboard.py --output-dir output
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit & push outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: dashboard update $(date -u +%Y-%m-%d)"
          git push